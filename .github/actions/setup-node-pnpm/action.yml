name: Setup Node + pnpm
description: Activate pnpm and Node (versions read from package.json), then install with a frozen lockfile.

runs:
  using: composite

  steps:
    # Activate pnpm. Reads `packageManager: pnpm@<version>` from package.json
    # so CI uses the exact same pnpm version as local dev.
    - uses: pnpm/action-setup@d15e628ca66d93ee5f352c71671a7bc6a97af5c9 # v6.0.8

    # Activate Node. `node-version-file: package.json` reads `engines.node`,
    # so CI uses the same Node range as local. `cache: pnpm` enables the
    # built-in pnpm store cache (much faster warm installs).
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: package.json
        cache: pnpm

    # Deterministic install; fails if pnpm-lock.yaml is out of sync with
    # package.json, and never modifies the lockfile.
    - shell: bash
      run: pnpm install --frozen-lockfile
