name: TokenlineWidget
options:
  bundleIdPrefix: tech.inbrace.tokenline
  deploymentTarget:
    macOS: "13.0"
packages:
  TokenlineWidgetKit:
    path: ../TokenlineWidgetKit
targets:
  TokenlineWidget:
    type: application
    platform: macOS
    sources: [Sources]
    info:
      path: Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: Perch
    dependencies:
      - package: TokenlineWidgetKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: tech.inbrace.tokenline.widget
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_IDENTITY: "-"
